name: cask checks

on:
  push:
    branches:
      - main
    paths:
      - Casks/**
      - .github/workflows/cask-tests.yml
  pull_request:
    paths:
      - Casks/**
      - .github/workflows/cask-tests.yml

jobs:
  audit:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Style and audit casks
        run: |
          shopt -s nullglob
          casks=(Casks/*.rb)
          if [ ${#casks[@]} -eq 0 ]; then
            echo "No casks to check"
            exit 0
          fi

          brew style --display-cop-names "${casks[@]}"

          for cask in "${casks[@]}"; do
            echo "Auditing ${cask}"
            brew audit --cask --strict "$cask"
          done
